<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sahibinden Ozetleyici</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Sahibinden Ozetleyici</h1>
      <p class="tagline" id="tagline">Ilan algilaniyor...</p>
    </div>
  </header>

  <!-- Status Bar -->
  <div class="status-bar loading" id="statusBar">
    <div class="status-dot"></div>
    <span id="statusText">Sayfa kontrol ediliyor...</span>
  </div>

  <!-- Not Sahibinden Message -->
  <div id="notSahibinden" class="not-sahibinden hidden">
    <div class="not-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M16 16s-1.5-2-4-2-4 2-4 2"/>
        <line x1="9" y1="9" x2="9.01" y2="9"/>
        <line x1="15" y1="9" x2="15.01" y2="9"/>
      </svg>
    </div>
    <p class="not-title">Bu sayfa sahibinden.com degil</p>
    <p class="not-desc">Bir sahibinden.com ilan sayfasina gidin, uzanti otomatik olarak ozeti cikaracak.</p>
  </div>

  <!-- Loading (full state) -->
  <div id="loading" class="loading-full hidden">
    <div class="loading-anim">
      <div class="loading-ring"></div>
      <svg class="loading-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
    </div>
    <p class="loading-text" id="loadingText">Ilan ozetleniyor...</p>
  </div>

  <!-- Error -->
  <div id="errorBox" class="error-box hidden">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="15" y1="9" x2="9" y2="15"/>
      <line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    <span id="errorText"></span>
    <button class="btn-retry" id="btnRetry">Tekrar Dene</button>
  </div>

  <!-- Results -->
  <div id="results" class="results hidden">
    <!-- Title -->
    <div class="result-card result-title" id="cardBaslik">
      <div class="result-label">Baslik</div>
      <div class="result-value" id="resBaslik"></div>
    </div>

    <!-- Price & Listing Number -->
    <div class="result-row">
      <div class="result-card" id="cardFiyat">
        <div class="result-label">Fiyat</div>
        <div class="result-value result-price" id="resFiyat"></div>
      </div>
      <div class="result-card" id="cardIlanNo">
        <div class="result-label">Ilan No</div>
        <div class="result-value" id="resIlanNo"></div>
      </div>
    </div>

    <!-- Location -->
    <div class="result-card" id="cardKonum">
      <div class="result-label">Konum</div>
      <div class="result-value" id="resKonum"></div>
    </div>

    <!-- Properties -->
    <div class="result-card" id="cardOzellikler">
      <div class="result-label">
        Ozellikler
        <span class="prop-count" id="propCount"></span>
      </div>
      <div class="result-props" id="resOzellikler"></div>
    </div>

    <!-- Description -->
    <div class="result-card" id="cardAciklama">
      <div class="result-label">
        Aciklama
        <button class="btn-toggle" id="btnToggleDesc" title="Genislet/Daralt">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
      </div>
      <div class="result-value result-desc collapsed" id="resAciklama"></div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="btnDownload" class="btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>JSON Indir</span>
      </button>
      <button id="btnCopy" class="btn-secondary btn-ghost">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span>Kopyala</span>
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
